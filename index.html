<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>裝置清單</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; }
    body {
      background-color: #000;
      color: #0f0;
      font-family: 'Courier New', Courier, monospace;
      padding: 1rem;
      margin: 0;
      overflow: hidden;
    }
    .banner {
      background: red;
      color: white;
      padding: 1rem;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      animation: blink 0.5s step-end infinite alternate;
    }
    @keyframes blink {
      from { opacity: 1; }
      to { opacity: 0.3; }
    }
    .device-list {
      margin-top: 2rem;
    }
    .device {
      background: #111;
      padding: 1rem;
      margin: 0.5rem 0;
      border: 1px solid #0f0;
    }
    #no-signal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('https://media.tenor.com/CGbK2TZG-C0AAAAC/no-signal.gif') center/cover no-repeat;
      z-index: 9999;
      animation: flash 1s ease-in-out 3, rainbow 0.2s infinite;
    }
    @keyframes flash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes rainbow {
      0% { background-color: red; }
      14% { background-color: orange; }
      28% { background-color: yellow; }
      42% { background-color: green; }
      57% { background-color: blue; }
      71% { background-color: indigo; }
      85% { background-color: violet; }
      100% { background-color: red; }
    }
    .qr {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      background: #fff;
      padding: 0.5rem;
      border-radius: 0.5rem;
      z-index: 10;
      cursor: pointer;
      transition: all 0.5s ease;
    }
    .qr img {
      width: 150px;
      height: 150px;
    }
    .error-window {
      position: absolute;
      width: 300px;
      background: #ddd;
      border: 2px solid #000;
      padding: 0.5rem;
      font-family: sans-serif;
      box-shadow: 5px 5px 0px #000;
      z-index: 1000;
    }
    .error-header {
      font-weight: bold;
      margin-bottom: 0.5rem;
      background: #000080;
      color: #fff;
      padding: 0.2rem;
    }
    .close-btn {
      float: right;
      cursor: pointer;
      color: red;
    }
  </style>
</head>
<body>
  <div id="no-signal"></div>

  <div class="banner">‼️ 正在嘗試連線裝置 ‼️</div>

  <div class="device-list">
    <div class="device">
      <strong>名稱：</strong>未知裝置 A01<br>
      <strong>IP：</strong>192.168.1.241<br>
      <strong>MAC：</strong>48:E7:DA:43:22:17<br>
      <strong>地點：</strong>新北市板橋區大觀路一段
    </div>
    <div class="device">
      <strong>名稱：</strong>Unknown_Device_02<br>
      <strong>IP：</strong>192.168.1.109<br>
      <strong>MAC：</strong>34:AF:2B:91:88:6E<br>
      <strong>地點：</strong>新北市板橋區大觀路一段
    </div>
  </div>

  <div class="qr">
    <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.youtube.com/watch?v=dQw4w9WgXcQ" alt="QR Code">
    </a>
  </div>

  <audio id="alarm" src="https://freesound.org/data/previews/522/522304_10629644-lq.mp3" autoplay></audio>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('no-signal').remove();
      }, 3000);
    });

    // QR隨機變換位置
    setInterval(() => {
      const qr = document.querySelector('.qr');
      const screenWidth = window.innerWidth;
      const screenHeight = window.innerHeight;
      const randomX = Math.random() * (screenWidth - 160); // 150px QR + 10px padding
      const randomY = Math.random() * (screenHeight - 160); // 150px QR + 10px padding
      qr.style.left = `${randomX}px`;
      qr.style.top = `${randomY}px`;
    }, 2000);

    document.body.addEventListener('click', (e) => {
      const err = document.createElement('div');
      err.className = 'error-window';
      err.style.top = `${e.clientY}px`;
      err.style.left = `${e.clientX}px`;
      err.innerHTML = `
        <div class="error-header">錯誤 - 系統偵測異常 <span class="close-btn" onclick="this.parentElement.parentElement.remove()">X</span></div>
        無法辨識的裝置正在嘗試連線至您的網路。
      `;
      document.body.appendChild(err);
    });
  </script>
</body>
</html>
