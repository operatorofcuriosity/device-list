<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>裝置連線監控中</title>
  <style>
    body {
      background-color: black;
      color: #33ff33;
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      overflow: hidden;
    }
    .warning {
      color: red;
      font-size: 1.5em;
      text-align: center;
      margin-top: 10px;
      animation: blink 1s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .device-list {
      padding: 20px;
    }
    .glitch {
      animation: glitch 0.3s infinite;
    }
    @keyframes glitch {
      0% { transform: skew(0.5deg); }
      20% { transform: skew(-1deg); }
      40% { transform: skew(1.5deg); }
      60% { transform: skew(-0.5deg); }
      80% { transform: skew(1deg); }
      100% { transform: skew(0deg); }
    }
    .qr-code {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      padding: 10px;
      z-index: 1000;
    }
    .qr-code-text {
      color: white;
      font-size: 0.8em;
      text-align: center;
    }
    .no-signal {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url('https://upload.wikimedia.org/wikipedia/commons/2/27/Color_Bars.svg');
      background-size: cover;
      z-index: 999;
      animation: flash 0.15s ease-in-out 5;
    }
    @keyframes flash {
      0%, 100% { opacity: 0; }
      25%, 75% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="no-signal"></div>
  <div class="warning">‼️ 裝置連線已被監控 ‼️</div>
  <div class="device-list">
    <p>192.168.1.241 - 48:E7:DA:43:22:17</p>
    <p>192.168.1.157 - 12:34:56:78:90:AB</p>
    <p>192.168.1.102 - 22:33:44:55:66:77</p>
  </div>
  <div class="qr-code">
    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://www.youtube.com/watch?v=dQw4w9WgXcQ" alt="Rickroll QR">
    <div class="qr-code-text">掃描查看詳細資訊</div>
  </div>
  <script>
    // 隨機生成錯誤視窗
    function spawnErrorWindow() {
      const win = document.createElement('div');
      win.textContent = '錯誤：系統異常';
      win.style.position = 'fixed';
      win.style.top = Math.random() * window.innerHeight + 'px';
      win.style.left = Math.random() * window.innerWidth + 'px';
      win.style.background = 'white';
      win.style.color = 'black';
      win.style.padding = '10px';
      win.style.border = '2px solid red';
      win.style.zIndex = 1001;
      document.body.appendChild(win);
    }

    document.body.addEventListener('click', () => {
      spawnErrorWindow();
    });

    // 螢幕崩壞閃爍效果
    setInterval(() => {
      document.body.classList.toggle('glitch');
    }, 3000);

    // 警報音效
    const audio = new Audio('https://cdn.pixabay.com/download/audio/2021/08/04/audio_b4e9e69216.mp3');
    audio.play();
  </script>
</body>
</html>
