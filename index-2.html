<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>裝置清單 Device List</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

    // ✅ 替換成你的 Firebase 設定
    const firebaseConfig = {
      apiKey: "AIzaSyBwyVgeoxAOZmMyg3UeIqn5LF6iI65NonE",
      authDomain: "device-list-monitor-b59b8.firebaseapp.com",
      databaseURL: "https://device-list-monitor-b59b8-default-rtdb.firebaseio.com",
      projectId: "device-list-monitor-b59b8",
      storageBucket: "device-list-monitor-b59b8.appspot.com",
      messagingSenderId: "1049547150285",
      appId: "1:1049547150285:web:e42edebcd86b45351faa84"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    async function loadDevices() {
      const snapshot = await get(ref(db, 'devices'));
      const container = document.getElementById('device-list');
      container.innerHTML = ''; // 清空

      if (snapshot.exists()) {
        const devices = snapshot.val();
        for (const [id, data] of Object.entries(devices)) {
          const div = document.createElement('div');
          div.className = 'device';
          div.innerHTML = `
            <h3>${data.device}</h3>
            <p><strong>使用者：</strong> ${data.owner}</p>
            <p><strong>作業系統：</strong> ${data.os}</p>
            <p><strong>IP：</strong> ${data.ip}</p>
            <p><strong>最後出現時間：</strong> ${data.lastSeen}</p>
            <p><strong>地點：</strong> 新北市板橋區大觀路一段</p>
          `;
          container.appendChild(div);
        }
      } else {
        container.innerHTML = '<p>目前沒有裝置資料</p>';
      }
    }

    window.addEventListener('DOMContentLoaded', loadDevices);
  </script>

  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    .device {
      background: #222;
      border: 1px solid #444;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    h1 {
      color: #66ffcc;
    }
    h3 {
      margin: 0 0 5px;
      color: #ffcc66;
    }
  </style>
</head>
<body>
  <h1>📡 裝置清單</h1>
  <div id="device-list">載入中...</div>
</body>
</html>
